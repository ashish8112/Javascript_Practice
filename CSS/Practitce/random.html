<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card with Animations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f4;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 300px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      text-align: center;

      /* Animation: Fade-in */
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s ease-out forwards;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    /* Card Hover Effect */
    .profile-card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .profile-card .details {
      padding: 20px;
    }

    .profile-card .details h2 {
      margin: 10px 0 5px;
      font-size: 24px;
      color: #333;
    }

    .profile-card .details p {
      margin: 0;
      font-size: 16px;
      color: #777;
    }

    .profile-card .details a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      color: white;
      background-color: #007bff;
      text-decoration: none;
      border-radius: 5px;

      /* Animation for hover */
      transition: background-color 0.3s ease, transform 0.3s ease;
    }

    /* Button Hover Effect */
    .profile-card .details a:hover {
      background-color: #0056b3;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img src="Resume img.jpg" alt="Profile Picture">
    <div class="details">
      <h2>Ashish Shukla</h2>
      <p>Web Developer | Designer</p>
      <a href="#">View Profile</a>
    </div>
  </div>
</body>
</html>
