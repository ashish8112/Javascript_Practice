<!DOCTYPE html>
<html>
<head>
<style>
    *{
        padding:0;
        margin:0;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        width: 100vw;
    }

.item1 {
  grid-area: myArea;
  background-color: green;
}
.item2{
grid-area: myArea2;
background-color: green;
}
.item3{
grid-area: myArea3;
background-color: red;
}
.item4{
grid-area: myArea4;
background-color: orange;
}.item5{
grid-area: myArea5;
background-color: red;
}
.item6{
grid-area: myArea6;
background-color: red;
}
.item7{
grid-area: myArea7;
background-color: orange;
}
.item8{
grid-area: myArea8;
background-color: green;
}
.grid-container {
  display: grid;
  grid-template-areas: 
  "myArea2 myArea myArea myArea3 "
  "myArea2 myArea4 myArea5 myArea8"
  "myArea2 myArea6 myArea7 myArea8";
  grid-gap: 10px;
  background-color:rgb(0, 0, 0);
  padding: 10px;
  height: 100%;
  width: 100%;
  
}

.grid-container > div {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  color:#fff;
  
}
</style>
</head>
<body>

<div class="grid-container">
  <div class="item1">1</div>
  <div class="item2">2</div>
  <div class="item3">3</div>  
  <div class="item4">4</div>
  <div class="item5">5</div>
  <div class="item6">6</div>
  <div class="item7">7</div>
  <div class="item8">8</div>
</div>

</body>
</html>
