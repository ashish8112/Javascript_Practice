<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .container{
            height: 100vh;
            width: 100vw;
            background-color: rgb(48, 48, 112);
            display:grid;
            grid-template-rows: repeat(8,1fr);
            grid-template-columns: repeat(1,1fr);
            gap:10px;
            padding:2rem;
        }
        .box1,.box2,.box8{
            background-color: rgb(85, 124, 27);
        }
        .box3,.box5,.box7{
            background-color: rgb(180, 35, 35);
        }
        .box4,.box6{
            background-color: rgb(212, 212, 65);
        }
        .box{
            font-size: 1.4rem;
            color:white;
            display:flex;
            align-items: center;
            justify-content: center;
        }
        
        @media(min-width:800px)
        {
            .box1{
            grid-row-start: 1;
            grid-row-end:4;
        }
        .box2{
            grid-column-start: 2;
            grid-column-end: 4;
        }
        .box8{
            grid-column-start: 4;
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .box7{
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
        }
        .box6{
            grid-column-start: 3;
            grid-column-end: 4;
        }
        .container{
            grid-template-rows: repeat(3,1fr);
            grid-template-columns: repeat(4,1fr);
        }
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Sidebar</div>
        <div class="box box2">Header</div>
        <div class="box box3">sidebar2</div>
        <div class="box box4">content1</div>
        <div class="box box5">content2</div>
        <div class="box box6">content4</div>
        <div class="box box7">content3</div>
        <div class="box box8">sidebar3</div>
    </div>

</body>
</html>
