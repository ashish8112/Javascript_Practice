<!DOCTYPE html>
<html>
    <head>
        <title>Property of Flex-grow & Flex-shrink </title>
        <link rel="stylesheet" href="grow&shrink.css">
    </head>
    <body>
        <h1 class="header">
            Flex-grow 
        </h1>
        <div class="container1">
            <div class="box1">box1</div>
            <div class="box2">box2</div>
            <div class="box3">box3</div>
            <div class="box4">box4</div>
        </div>
        <br><hr>

        <h1 class="header">
            Flex-shrink
        </h1>
        <p>Do not let the Second flex item shrink as much as the other flex items <b>Flex-shrink:0;</b></p>
        <div class="container2">
            <div class="box1">box1</div>
            <div class="box2">box2</div>
            <div class="box3">box3</div>
            <div class="box4">box4</div>
        </div>
    </body>
</html>
