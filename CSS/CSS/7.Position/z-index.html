<!DOCTYPE html>
<html>
    <head>
        <title>Z-index propery </title>
            <style>
                div{
                    height: 100px;
                    width: 100px;
                    border:2px solid black;
                    display:inline-block;
                }
                #box1{
                    background-color:black;
                    color:white;
                    z-index:-2;
                    position: relative;

                }
                #box2{
                    background-color: red;
                    color:white;
                    position: relative;
                    left:-90px;
                    z-index:-1;
                }
            </style>
    </head>
    <body>
        <div id="box1">Box1</div>
        <div id="box2">Box2</div>
    </body>
</html>
