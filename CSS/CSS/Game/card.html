<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px;
        }

        .card {
            width: 100px;
            height: 100px;
            background-color: #fff;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            border-radius: 10px;
        }

        .card-front {
            background-color: #2196F3;
            color: white;
            transform: rotateY(180deg);
        }

        .card-back {
            background-color: #ccc;
            color: transparent;
        }

        .score {
            font-size: 1.5em;
            margin: 20px;
        }

        .reset-btn {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="score">Score: <span id="score">0</span></div>
    <div class="game-board" id="gameBoard"></div>
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
        let flippedCards = [];
        let score = 0;
        
        // Create game board
        function createBoard() {
            const gameBoard = document.getElementById('gameBoard');
            const duplicatedEmojis = [...emojis, ...emojis];
            const shuffledEmojis = duplicatedEmojis.sort(() => Math.random() - 0.5);

            shuffledEmojis.forEach(emoji => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-front">${emoji}</div>
                    <div class="card-back"></div>
                `;
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
            });
        }

        // Flip card
        function flipCard(card) {
            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    checkMatch();
                }
            }
        }

        // Check for match
        function checkMatch() {
            const [card1, card2] = flippedCards;
            const emoji1 = card1.querySelector('.card-front').textContent;
            const emoji2 = card2.querySelector('.card-front').textContent;

            if (emoji1 === emoji2) {
                score += 10;
                document.getElementById('score').textContent = score;
                flippedCards = [];
                checkWin();
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        // Check if all cards are matched
        function checkWin() {
            const allCards = document.querySelectorAll('.card');
            const matchedCards = document.querySelectorAll('.flipped');
            
            if (matchedCards.length === allCards.length) {
                setTimeout(() => {
                    alert(`Congratulations! You won with a score of ${score}!`);
                }, 500);
            }
        }

        // Reset game
        function resetGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            flippedCards = [];
            score = 0;
            document.getElementById('score').textContent = score;
            createBoard();
        }

        // Start game
        createBoard();
    </script>
</body>
</html>
