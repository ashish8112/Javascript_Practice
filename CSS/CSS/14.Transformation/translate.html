<!DOCTYPE html>
<html>
    <head>
        <title>Translate</title>
        <style>
            *{
                padding:0;
                margin:0;
                box-sizing:border-box;
            }
            .square{
                height: 150px;
                width: 150px;
                border:2px solid black;
                background-color: blue;
                border-radius: 5px;
                margin:auto;
                position: relative;
                top:200px;
                transition:all 2s linear ;
                

            }
            .square:hover{
                transform:translate(200px,200px);
            }
            .square:active{
                transform:translate(-100%,-100%);
            }
           

            </style>
    </head>
    <body>
        <div class="square">
        </div>
    </body>
</html>
