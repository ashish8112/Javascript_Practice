<!DOCTYPE html>
<html>
    <head>
        <title>scale</title>
        <style>
            *{
                padding:0;
                margin:0;
                box-sizing:border-box;
            }
            .square{
                height: 150px;
                width: 150px;
                display: flex;
                color:white;
                justify-content: center;
                align-items: center;
                border:2px solid black;
                background-color: blue;
                border-radius: 5px;
                margin:auto;
                position: relative;
                top:200px;
                transition:all 2s linear  ;
            }
            div:hover{
                transform:scaleX(-2);
            }
            div:active{
                transform:scale(2,3);
            }

            </style>
    </head>
    <body>
        <div class="square">
                <p>Ashish!</p>
        </div>
    </body>
</html>
