<!DOCTYPE html>
<html>
    <head>
        <title>Table </title>
        <style>
            table{
                border:1px solid black;
                width: 500px;
                border-collapse:collapse;
            }
            th,td{
                text-align: center;
                border:2px solid black;
            }
        
            </style>
    </head>
    <body>
        <table>
            <thead>
                <tr>
                    <th>Monday</th>
                    <th>Tuesday </th>
                    <th>Wednesday </th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Ashish </td>
                    <td>India </td>
                    <td>Pakistan</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
