<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <!-- <link rel="stylesheet" href="styles.css" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      *{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body{
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;

  width: 100%;
  background-color: #c2c2c2;
}
.container{
  display: flex;
    gap:20px;
    box-shadow: 0 54px 55px #00000040,0 -12px 30px #0000001f,0 4px 6px #0000001f,0 12px 13px #0000002b,0 -3px 5px #00000017;
    background-color: #fff;
    border-radius: 8px;
    padding: 20px;
}
.Image{
height: 100px;
width: 100px;
}
img{
  width: 100%;
  height: 100%;
  border-radius: 50%;
}
 p{
    color:grey;
    margin-bottom: 10px;
  }
button:hover{
  color: #fff;
  background-color: purple;
}
button {
  margin-left: 20px;
  border-radius: 18px;
  outline: none;
  border: 1px solid grey;
  color: purple;
  background-color: #fff;
  padding: 12px 16px;
  cursor: pointer;
  transition: all 0.2s ease;
}
button:active{
  background-color: hsl(300, 100%, 55%);
}
@media (max-width: 768px) {
  .container{
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .Image{
    display: flex;
    align-items: center;
  }
  h2{
    margin: 0px 0px;
  }
 
  .Details{
    display: flex;
    flex-direction: column;
    align-items: center;
    
  }
  .Details button{
    margin-left:0px;
  }

}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="Image">
        <img src="https://www.shutterstock.com/editorial/image-editorial/M4T1If5eM1zfQ449MzEyMDM=/selena-gomez-1500w-12825989bg.jpg">
      </div>
       <div class="Details">
        <h2 >Erin LindFord</h2>
        <p>Product Engineer</p>
        <button >Message</button>
       </div>
       </div>
  </body>
</html>
